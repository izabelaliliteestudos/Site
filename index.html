<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precificação Exclusiva | Atelier</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #FAF9F6;
            --text-color: #2C2C2C;
            --accent-color: #D4AF37; /* Dourado suave */
            --border-color: #E0E0E0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: #FFFFFF;
            padding: 3rem;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
            max-width: 450px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            color: var(--text-color);
        }

        p.subtitle {
            font-size: 0.85rem;
            color: #7A7A7A;
            margin-bottom: 2.5rem;
        }

        .input-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
            color: var(--text-color);
        }

        input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 2px;
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            box-sizing: border-box;
            background-color: transparent;
            transition: border-color 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        button {
            width: 100%;
            padding: 1rem;
            background-color: var(--text-color);
            color: #FFFFFF;
            border: none;
            border-radius: 2px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 1rem;
        }

        button:hover {
            background-color: #000000;
        }

        .paywall-modal {
            display: none;
            margin-top: 2rem;
            padding: 1.5rem;
            border: 1px solid var(--accent-color);
            background-color: #FFFCF5;
        }

        .paywall-modal h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            margin-top: 0;
            color: var(--text-color);
        }

        .price-tag {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--accent-color);
            margin: 1rem 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Consultoria de Valor</h1>
        <p class="subtitle">A arte de precificar com precisão</p>

        <div class="input-group">
            <label for="materiais">Custo dos Materiais (R$)</label>
            <input type="number" id="materiais" placeholder="Ex: 45.50" step="0.01">
        </div>

        <div class="input-group">
            <label for="horas">Horas de Dedicação</label>
            <input type="number" id="horas" placeholder="Ex: 4">
        </div>

        <button onclick="solicitarPrecificacao()">Revelar Precificação</button>

        <div class="paywall-modal" id="paywall">
            <h2>Cálculo Concluído</h2>
            <p>Seu relatório detalhado de precificação está pronto.</p>
            <div class="price-tag">R$ 1,00</div>
            <p style="font-size: 0.8rem; color: #7A7A7A;">Para visualizar o valor final sugerido e a margem de lucro, proceda com o pagamento.</p>
            <button style="background-color: var(--accent-color); color: #FFF;">Pagar via Pix</button>
        </div>
    </div>

    <script>
        function solicitarPrecificacao() {
            const materiais = document.getElementById('materiais').value;
            const horas = document.getElementById('horas').value;

            if(!materiais || !horas) {
                alert("Por gentileza, preencha os custos e as horas de dedicação.");
                return;
            }

            // Aqui entra a lógica que futuramente conectará ao seu Back-end.
            // Por enquanto, apenas exibimos a tela de cobrança.
            document.getElementById('paywall').style.display = 'block';
            
            // Rola a página suavemente até o modal de pagamento
            document.getElementById('paywall').scrollIntoView({ behavior: 'smooth' });
        }
    </script>

</body>
</html>
