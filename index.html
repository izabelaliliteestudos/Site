<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precificação Exclusiva | Atelier</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #FAF9F6;
            --text-color: #2C2C2C;
            --accent-color: #D4AF37; /* Dourado suave */
            --border-color: #E0E0E0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 0;
        }

        .container {
            background: #FFFFFF;
            padding: 3rem;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
            max-width: 500px;
            width: 90%;
            text-align: center;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: var(--text-color);
        }

        p.subtitle {
            font-size: 0.9rem;
            color: #7A7A7A;
            margin-bottom: 2.5rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            text-align: left;
            margin-bottom: 1.5rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group.full-width {
            grid-column: span 2;
        }

        label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
            color: var(--text-color);
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 0.9rem;
            border: 1px solid var(--border-color);
            border-radius: 2px;
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            box-sizing: border-box;
            background-color: transparent;
            transition: border-color 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        button {
            width: 100%;
            padding: 1.2rem;
            background-color: var(--text-color);
            color: #FFFFFF;
            border: none;
            border-radius: 2px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 1rem;
        }

        button:hover {
            background-color: #000000;
        }

        .paywall-modal {
            display: none;
            margin-top: 2.5rem;
            padding: 2rem;
            border: 1px solid var(--accent-color);
            background-color: #FFFCF5;
            text-align: left;
        }

        .paywall-modal h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            margin-top: 0;
            text-align: center;
            color: var(--text-color);
        }

        .report-line {
            display: flex;
            justify-content: space-between;
            margin: 1rem 0;
            font-size: 0.95rem;
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 0.5rem;
        }

        .price-tag {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--accent-color);
            text-align: center;
            margin: 1.5rem 0 0.5rem 0;
        }

        .btn-pix {
            background-color: var(--accent-color);
            color: #FFF;
            margin-top: 1.5rem;
        }

        .btn-pix:hover {
            background-color: #B8962E;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Consultoria de Valor</h1>
        <p class="subtitle">A arte de precificar com primor e precisão</p>

        <div class="form-grid">
            <div class="input-group full-width">
                <label for="materiais">Custo Total dos Materiais (R$)</label>
                <input type="number" id="materiais" placeholder="Ex: 45.50" step="0.01">
            </div>

            <div class="input-group">
                <label for="valor-hora">Valor da Sua Hora (R$)</label>
                <input type="number" id="valor-hora" placeholder="Ex: 25.00" step="0.01">
            </div>

            <div class="input-group">
                <label for="horas">Horas de Dedicação</label>
                <input type="number" id="horas" placeholder="Ex: 4" step="0.5">
            </div>

            <div class="input-group">
                <label for="extras">Embalagem & Fixos (R$)</label>
                <input type="number" id="extras" placeholder="Ex: 8.50" step="0.01">
            </div>

            <div class="input-group">
                <label for="lucro">Margem de Lucro (%)</label>
                <input type="number" id="lucro" placeholder="Ex: 30" step="1">
            </div>
        </div>

        <button onclick="solicitarPrecificacao()">Gerar Relatório Profissional</button>

        <div class="paywall-modal" id="paywall">
            <h2>Dossiê de Precificação</h2>
            
            <div class="report-line">
                <span>Mão de Obra:</span>
                <strong id="res-mao-de-obra">R$ 0,00</strong>
            </div>
            <div class="report-line">
                <span>Custo Total de Produção:</span>
                <strong id="res-custo-total">R$ 0,00</strong>
            </div>
            <div class="report-line">
                <span>Lucro Líquido do Atelier:</span>
                <strong id="res-lucro-liquido">R$ 0,00</strong>
            </div>

            <div class="price-tag" style="font-size: 1rem; color: #7A7A7A; font-weight: 400; margin-bottom: 0;">Preço Sugerido de Venda</div>
            <div class="price-tag" id="res-preco-venda" style="margin-top: 0;">R$ 0,00</div>
            
            <p style="font-size: 0.8rem; color: #7A7A7A; text-align: center; margin-top: 1.5rem;">[Modo de Teste Dinâmico Ativo]</p>
        </div>
    </div>

    <script>
        function solicitarPrecificacao() {
            // Captura dos valores inseridos na interface
            const materiais = parseFloat(document.getElementById('materiais').value);
            const valorHora = parseFloat(document.getElementById('valor-hora').value);
            const horas = parseFloat(document.getElementById('horas').value);
            const extras = parseFloat(document.getElementById('extras').value);
            const lucro = parseFloat(document.getElementById('lucro').value);

            // Validação de segurança para campos vazios
            if(isNaN(materiais) || isNaN(valorHora) || isNaN(horas) || isNaN(extras) || isNaN(lucro)) {
                alert("Por gentileza, preencha todos os campos para garantirmos a máxima precisão do seu cálculo.");
                return;
            }

            // EXECUÇÃO DA LÓGICA MATEMÁTICA
            const custoMaoDeObra = valorHora * horas;
            const custoTotal = materiais + custoMaoDeObra + extras;
            const valorLucro = custoTotal * (lucro / 100);
            const precoVenda = custoTotal + valorLucro;

            // INSERÇÃO DOS RESULTADOS NA INTERFACE VISUAL
            document.getElementById('res-mao-de-obra').innerText = "R$ " + custoMaoDeObra.toFixed(2).replace('.', ',');
            document.getElementById('res-custo-total').innerText = "R$ " + custoTotal.toFixed(2).replace('.', ',');
            document.getElementById('res-lucro-liquido').innerText = "R$ " + valorLucro.toFixed(2).replace('.', ',');
            document.getElementById('res-preco-venda').innerText = "R$ " + precoVenda.toFixed(2).replace('.', ',');

            // Exibição do bloco de resultados com animação suave
            const paywall = document.getElementById('paywall');
            paywall.style.display = 'block';
            paywall.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    </script>

</body>
</html>
