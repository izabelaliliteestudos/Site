<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precificação Exclusiva | Atelier</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #FAF9F6;
            --text-color: #2C2C2C;
            --accent-color: #D4AF37; /* Dourado Premium */
            --border-color: #EAEAEA;
            --card-bg: #FFFFFF;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 3rem 0;
        }

        .container {
            background: #FFFFFF;
            padding: 3.5rem;
            border-radius: 2px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.02);
            max-width: 550px;
            width: 90%;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
            letter-spacing: 0.5px;
        }

        p.subtitle {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #8A8A8A;
            margin-bottom: 3rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            text-align: left;
            margin-bottom: 2rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group.full-width {
            grid-column: span 2;
        }

        label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 0.6rem;
            color: #555555;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 0;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.95rem;
            box-sizing: border-box;
            background-color: #FCFCFC;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-color);
            background-color: #FFFFFF;
            box-shadow: 0 4px 12px rgba(212, 175, 55, 0.05);
        }

        .btn-primary {
            width: 100%;
            padding: 1.3rem;
            background-color: var(--text-color);
            color: #FFFFFF;
            border: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .btn-primary:hover {
            background-color: #000000;
        }

        /* ESTILIZAÇÃO PREMIUM DO DOSSIÊ (RELATÓRIO) */
        .dossier-wrapper {
            display: none;
            margin-top: 3.5rem;
            padding-top: 3rem;
            border-top: 1px solid var(--border-color);
            text-align: left;
        }

        .dossier-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .dossier-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 400;
            margin: 0 0 0.5rem 0;
        }

        .dossier-header p {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 0.9rem;
            color: var(--accent-color);
            margin: 0;
        }

        .metric-card {
            background: #FAFAFA;
            padding: 1.2rem;
            margin-bottom: 1rem;
            border-left: 2px solid var(--text-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .metric-card.accent {
            border-left-color: var(--accent-color);
            background: #FFFDF9;
        }

        .metric-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #666;
        }

        .metric-value {
            font-size: 1.05rem;
            font-weight: 500;
        }

        .final-price-box {
            text-align: center;
            background: var(--text-color);
            color: #FFFFFF;
            padding: 2.5rem 1rem;
            margin: 2rem 0;
            position: relative;
        }

        .final-price-box .title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #CCCCCC;
            margin-bottom: 0.5rem;
        }

        .final-price-box .value {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.4rem;
            font-weight: 300;
            color: var(--accent-color);
        }

        .btn-secondary {
            width: 100%;
            padding: 1rem;
            background-color: transparent;
            color: var(--text-color);
            border: 1px solid var(--text-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background-color: var(--text-color);
            color: #FFFFFF;
        }

        @media print {
            body { background: #FFF; }
            .container { box-shadow: none; border: none; }
            .form-grid, .btn-primary { display: none; }
            .dossier-wrapper { display: block !important; margin-top: 0; padding-top: 0; border: none; }
            .btn-secondary { display: none; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Consultoria de Valor</h1>
        <p class="subtitle">A precificação como obra de arte</p>

        <div class="form-grid">
            <div class="input-group full-width">
                <label for="materiais">Insumos e Materiais (R$)</label>
                <input type="number" id="materiais" placeholder="0.00" step="0.01">
            </div>

            <div class="input-group">
                <label for="valor-hora">Sua Hora de Trabalho (R$)</label>
                <input type="number" id="valor-hora" placeholder="0.00" step="0.01">
            </div>

            <div class="input-group">
                <label for="horas">Tempo Dedicado (Horas)</label>
                <input type="number" id="horas" placeholder="0">
            </div>

            <div class="input-group">
                <label for="extras">Custos Fixos & Embalagem (R$)</label>
                <input type="number" id="extras" placeholder="0.00" step="0.01">
            </div>

            <div class="input-group">
                <label for="lucro">Margem de Lucro (%)</label>
                <input type="number" id="lucro" placeholder="0">
            </div>
        </div>

        <button class="btn-primary" onclick="solicitarPrecificacao()">Gerar Dossiê de Valor</button>

        <div class="dossier-wrapper" id="paywall">
            <div class="dossier-header">
                <h2>Dossiê Exclusivo</h2>
                <p>A inteligência financeira por trás do feito à mão</p>
            </div>
            
            <div class="metric-card">
                <span class="metric-label">Mão de Obra Alocada</span>
                <span class="metric-value" id="res-mao-de-obra">R$ 0,00</span>
            </div>
            
            <div class="metric-card">
                <span class="metric-label">Custo Operacional Total</span>
                <span class="metric-value" id="res-custo-total">R$ 0,00</span>
            </div>
            
            <div class="metric-card accent">
                <span class="metric-label">Retorno de Lucro Líquido</span>
                <span class="metric-value" style="color: #B8962E; font-weight: 600;" id="res-lucro-liquido">R$ 0,00</span>
            </div>

            <div class="final-price-box">
                <div class="title">Preço Sugerido para Comercialização</div>
                <div class="value" id="res-preco-venda">R$ 0,00</div>
            </div>
            
            <button class="btn-secondary" onclick="window.print()">Guardar ou Imprimir Relatório</button>
        </div>
    </div>

    <script>
        function solicitarPrecificacao() {
            const materiais = parseFloat(document.getElementById('materiais').value);
            const valorHora = parseFloat(document.getElementById('valor-hora').value);
            const horas = parseFloat(document.getElementById('horas').value);
            const extras = parseFloat(document.getElementById('extras').value);
            const lucro = parseFloat(document.getElementById('lucro').value);

            if(isNaN(materiais) || isNaN(valorHora) || isNaN(horas) || isNaN(extras) || isNaN(lucro)) {
                alert("Por favor, preencha todos os campos do formulário.");
                return;
            }

            const custoMaoDeObra = valorHora * horas;
            const custoTotal = materiais + custoMaoDeObra + extras;
            const valorLucro = custoTotal * (lucro / 100);
            const precoVenda = custoTotal + valorLucro;

            document.getElementById('res-mao-de-obra').innerText = "R$ " + custoMaoDeObra.toFixed(2).replace('.', ',');
            document.getElementById('res-custo-total').innerText = "R$ " + custoTotal.toFixed(2).replace('.', ',');
            document.getElementById('res-lucro-liquido').innerText = "R$ " + valorLucro.toFixed(2).replace('.', ',');
            document.getElementById('res-preco-venda').innerText = "R$ " + precoVenda.toFixed(2).replace('.', ',');

            const paywall = document.getElementById('paywall');
            paywall.style.display = 'block';
            paywall.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    </script>

</body>
</html>
